<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Study Tracker</title>
    <style>
        :root {
            --sky-blue: #87CEEB;
            --gray-undone: #d3d3d3;
            --dark-text: #333;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: white; /* Clean white background for the widget */
            color: var(--dark-text);
            margin: 0;
            padding: 10px;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            box-sizing: border-box;
        }

        /* Flattened container to perfectly match iPhone Medium Widget proportions */
        .container {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            box-sizing: border-box;
        }

        /* Compact header section */
        .header-section {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 5px;
        }

        h1 {
            margin: 0;
            font-size: 1.1rem;
            font-weight: 700;
        }

        .streak-display {
            font-size: 1.1rem;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 3px;
        }

        /* Checklist now uses smaller spacing to fit the widget height */
        .checklist {
            display: flex;
            flex-direction: column;
            gap: 5px;
            margin-bottom: 5px;
        }

        .task-item {
            display: flex;
            align-items: center;
            padding: 6px 10px;
            background-color: #f9f9f9;
            border-radius: 6px;
            border-left: 3px solid var(--gray-undone);
            transition: all 0.2s ease;
        }

        .task-item.checked {
            border-left-color: var(--sky-blue);
            background-color: #f0f8ff;
        }

        .task-item input {
            margin-right: 10px;
            transform: scale(1.1);
            cursor: pointer;
        }

        .task-item a {
            font-size: 0.85rem;
            color: var(--dark-text);
            text-decoration: none;
            width: 100%;
            display: block;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis; /* Prevents text from wrapping and breaking layout */
        }

        /* Compact horizontal week bar */
        .week-bar {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 4px;
        }

        .day-box {
            background-color: var(--gray-undone);
            color: #555;
            padding: 4px 0;
            border-radius: 4px;
            font-size: 0.75rem;
            font-weight: 600;
            text-align: center;
        }

        .day-box.completed {
            background-color: var(--sky-blue);
            color: white;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header-section">
        <h1 id="current-date">Loading...</h1>
        <div class="streak-display" id="streak-container">
            Streak: <span id="streak-count">0</span>
        </div>
    </div>

    <div class="checklist">
        <div class="task-item">
            <input type="checkbox" id="task0" onclick="toggleTask(0)">
            <a href="https://qotd.collegeboard.org/" target="_blank">SAT Question of the Day</a>
        </div>
        <div class="task-item">
            <input type="checkbox" id="task1" onclick="toggleTask(1)">
            <a href="https://dl.bookfunnel.com/dr23s99lv4" target="_blank">Read News & answer questions</a>
        </div>
        <div class="task-item">
            <input type="checkbox" id="task2" onclick="toggleTask(2)">
            <a href="https://docs.google.com/spreadsheets/d/1IwmM6uSK15S0HBSmyIMgL8GT3XeUnkH1Aay9CYelRps/edit?usp=sharing" target="_blank">Memorize 10 vocab words</a>
        </div>
    </div>

    <div class="week-bar" id="week-bar">
        <div class="day-box" id="day-0">Sun.</div>
        <div class="day-box" id="day-1">Mon.</div>
        <div class="day-box" id="day-2">Tue.</div>
        <div class="day-box" id="day-3">Wed.</div>
        <div class="day-box" id="day-4">Thu.</div>
        <div class="day-box" id="day-5">Fri.</div>
        <div class="day-box" id="day-6">Sat.</div>
    </div>
</div>

<script>
    let state = {
        lastActiveDate: "", 
        streak: 0,
        tasks: [false, false, false],
        weekHistory: [false, false, false, false, false, false, false]
    };

    function loadState() {
        const saved = localStorage.getItem('dailyTrackerState');
        if (saved) {
            state = JSON.parse(saved);
        }
        checkDateTransition();
    }

    function saveState() {
        localStorage.setItem('dailyTrackerState', JSON.stringify(state));
    }

    function getTodayString() {
        const d = new Date();
        return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
    }

    function checkDateTransition() {
        const todayStr = getTodayString();
        const today = new Date();
        const currentDayOfWeek = today.getDay();

        if (state.lastActiveDate !== todayStr) {
            if (currentDayOfWeek === 0 && state.lastActiveDate !== "") {
                state.weekHistory = [false, false, false, false, false, false, false];
            }

            if (state.lastActiveDate !== "") {
                const lastDate = new Date(state.lastActiveDate + "T00:00:00");
                const lastDayOfWeek = lastDate.getDay();
                
                if (!state.weekHistory[lastDayOfWeek]) {
                    state.streak = 0;
                }
            }

            state.tasks = [false, false, false];
            state.lastActiveDate = todayStr;
            saveState();
        }
    }

    function toggleTask(index) {
        state.tasks[index] = !state.tasks[index];
        
        const allDone = state.tasks.every(t => t === true);
        const todayIndex = new Date().getDay();

        if (allDone && !state.weekHistory[todayIndex]) {
            state.weekHistory[todayIndex] = true;
            state.streak += 1;
        } 
        else if (!allDone && state.weekHistory[todayIndex]) {
            state.weekHistory[todayIndex] = false;
            state.streak = Math.max(0, state.streak - 1);
        }

        saveState();
        render();
    }

    function render() {
        const targetDate = new Date();
        
        // Shorter date format to save space
        const options = { weekday: 'short', month: 'short', day: 'numeric' };
        document.getElementById('current-date').innerText = targetDate.toLocaleDateString('en-US', options);

        const streakCountEl = document.getElementById('streak-count');
        if (state.streak >= 1) {
            streakCountEl.innerHTML = `${state.streak}<span style="color: #ff4500; font-size:1rem;">🔥</span>`;
        } else {
            streakCountEl.innerText = state.streak;
        }

        state.tasks.forEach((is_checked, index) => {
            const checkbox = document.getElementById(`task${index}`);
            const itemDiv = checkbox.closest('.task-item');
            checkbox.checked = is_checked;
            if (is_checked) {
                itemDiv.classList.add('checked');
            } else {
                itemDiv.classList.remove('checked');
            }
        });

        state.weekHistory.forEach((isDayDone, index) => {
            const dayBox = document.getElementById(`day-${index}`);
            if (isDayDone) {
                dayBox.classList.add('completed');
            } else {
                dayBox.classList.remove('completed');
            }
        });
    }

    loadState();
    render();
</script>

</body>
</html>
