<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Daily Study Tracker</title>
    <style>
        :root {
            --sky-blue: #87CEEB;
            --gray-undone: rgba(255, 255, 255, 0.4);
            --dark-text: #222;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 12px;
            box-sizing: border-box;
            overflow: hidden;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            background-color: #222;
        }

        /* Fullscreen rotating background layer */
        #bg-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-size: cover;
            background-position: center;
            opacity: 0.35; /* Keeps the background low-opacity and non-distracting */
            z-index: 1;
            transition: background-image 0.5s ease-in-out;
        }

        /* Main layout framework stretching perfectly to fit the widget boundaries */
        .container {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: space-between; /* Dynamically spreads elements to eliminate dead space */
            position: relative;
            z-index: 2;
        }

        /* Top navigation header */
        .top-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(255, 255, 255, 0.25);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            padding: 6px 10px;
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .meta-info {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        h1 {
            margin: 0;
            font-size: 1rem;
            font-weight: 800;
            color: #000;
            text-shadow: 0 1px 2px rgba(255,255,255,0.5);
        }

        .streak-display {
            font-size: 0.95rem;
            font-weight: bold;
            color: #000;
            text-shadow: 0 1px 2px rgba(255,255,255,0.5);
        }

        /* Horizontal progress layout row */
        .week-bar {
            display: flex;
            gap: 3px;
        }

        .day-box {
            background-color: rgba(0, 0, 0, 0.1);
            color: #222;
            padding: 3px 5px;
            border-radius: 4px;
            font-size: 0.65rem;
            font-weight: 700;
            text-align: center;
            min-width: 24px;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .day-box.completed {
            background-color: var(--sky-blue);
            color: white;
            border-color: var(--sky-blue);
            text-shadow: 0 1px 1px rgba(0,0,0,0.2);
        }

        /* Main interactive checklist section */
        .checklist {
            display: flex;
            flex-direction: column;
            gap: 6px;
            flex-grow: 1;
            justify-content: center; /* Vertically centers the list within the middle zone */
            margin: 4px 0;
        }

        .task-item {
            display: flex;
            align-items: center;
            padding: 8px 12px; /* Expanded slightly to occupy vertical space elegantly */
            background: rgba(255, 255, 255, 0.75);
            backdrop-filter: blur(5px);
            -webkit-backdrop-filter: blur(5px);
            border-radius: 8px;
            border-left: 4px solid rgba(0, 0, 0, 0.15);
            border-top: 1px solid rgba(255,255,255,0.4);
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            transition: all 0.2s ease;
        }

        .task-item.checked {
            border-left-color: var(--sky-blue);
            background: rgba(240, 248, 255, 0.85);
        }

        .task-item input {
            margin: 0 10px 0 0;
            transform: scale(1.1);
            cursor: pointer;
        }

        .task-item a {
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--dark-text);
            text-decoration: none;
            width: 100%;
            display: block;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* Subtle bottom accessory bar to firmly eliminate any appearance of dead space */
        .footer-bar {
            height: 3px;
            width: 40px;
            background: rgba(255, 255, 255, 0.4);
            border-radius: 10px;
            margin: 0 auto 2px auto;
        }
    </style>
</head>
<body>

<div id="bg-layer"></div>

<div class="container">
    <div class="top-row">
        <div class="meta-info">
            <h1 id="current-date">Loading...</h1>
            <div class="streak-display" id="streak-container">
                Str: <span id="streak-count">0</span>
            </div>
        </div>
        
        <div class="week-bar" id="week-bar">
            <div class="day-box" id="day-0">Su</div>
            <div class="day-box" id="day-1">Mo</div>
            <div class="day-box" id="day-2">Tu</div>
            <div class="day-box" id="day-3">We</div>
            <div class="day-box" id="day-4">Th</div>
            <div class="day-box" id="day-5">Fr</div>
            <div class="day-box" id="day-6">Sa</div>
        </div>
    </div>

    <div class="checklist">
        <div class="task-item">
            <input type="checkbox" id="task0" onclick="toggleTask(0)">
            <a href="https://qotd.collegeboard.org/" target="_blank">SAT Question of the Day</a>
        </div>
        <div class="task-item">
            <input type="checkbox" id="task1" onclick="toggleTask(1)">
            <a href="https://dl.bookfunnel.com/dr23s99lv4" target="_blank">Read News & answer questions</a>
        </div>
        <div class="task-item">
            <input type="checkbox" id="task2" onclick="toggleTask(2)">
            <a href="https://docs.google.com/spreadsheets/d/1IwmM6uSK15S0HBSmyIMgL8GT3XeUnkH1Aay9CYelRps/edit?usp=sharing" target="_blank">Memorize 10 vocab words</a>
        </div>
    </div>

    <div class="footer-bar"></div>
</div>

<script>
    // Rotates randomly between your uploaded landscape pictures on each load
    const images = [
        "https://images.unsplash.com/photo-1507525428034-b723cf961d3e?auto=format&fit=crop&w=1200&q=80", // Coastline / Beach
        "https://images.unsplash.com/photo-1506744038136-46273834b3fb?auto=format&fit=crop&w=1200&q=80", // Sunset Pier
        "https://images.unsplash.com/photo-1470071459604-3b5ec3a7fe05?auto=format&fit=crop&w=1200&q=80", // Mountain Fog / City Overlook
        "https://images.unsplash.com/photo-1513836279014-a89f7a76ae86?auto=format&fit=crop&w=1200&q=80"  // Deep Evening Skyscape
    ];

    function setRandomBackground() {
        const randomIndex = Math.floor(Math.random() * images.length);
        document.getElementById('bg-layer').style.backgroundImage = `url('${images[randomIndex]}')`;
    }

    let state = {
        lastActiveDate: "", 
        streak: 0,
        tasks: [false, false, false],
        weekHistory: [false, false, false, false, false, false, false]
    };

    function loadState() {
        const saved = localStorage.getItem('dailyTrackerState');
        if (saved) {
            state = JSON.parse(saved);
        }
        checkDateTransition();
    }

    function saveState() {
        localStorage.setItem('dailyTrackerState', JSON.stringify(state));
    }

    function getTodayString() {
        const d = new Date();
        return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
    }

    function checkDateTransition() {
        const todayStr = getTodayString();
        const today = new Date();
        const currentDayOfWeek = today.getDay();

        if (state.lastActiveDate !== todayStr) {
            if (currentDayOfWeek === 0 && state.lastActiveDate !== "") {
                state.weekHistory = [false, false, false, false, false, false, false];
            }

            if (state.lastActiveDate !== "") {
                const lastDate = new Date(state.lastActiveDate + "T00:00:00");
                const lastDayOfWeek = lastDate.getDay();
                
                if (!state.weekHistory[lastDayOfWeek]) {
                    state.streak = 0;
                }
            }

            state.tasks = [false, false, false];
            state.lastActiveDate = todayStr;
            saveState();
        }
    }

    function toggleTask(index) {
        state.tasks[index] = !state.tasks[index];
        
        const allDone = state.tasks.every(t => t === true);
        const todayIndex = new Date().getDay();

        if (allDone && !state.weekHistory[todayIndex]) {
            state.weekHistory[todayIndex] = true;
            state.streak += 1;
        } 
        else if (!allDone && state.weekHistory[todayIndex]) {
            state.weekHistory[todayIndex] = false;
            state.streak = Math.max(0, state.streak - 1);
        }

        saveState();
        render();
    }

    function render() {
        const targetDate = new Date();
        const options = { month: 'short', day: 'numeric' };
        document.getElementById('current-date').innerText = targetDate.toLocaleDateString('en-US', options);

        const streakCountEl = document.getElementById('streak-count');
        if (state.streak >= 1) {
            streakCountEl.innerHTML = `${state.streak}<span style="color: #ff4500; font-size:0.85rem;">🔥</span>`;
        } else {
            streakCountEl.innerText = state.streak;
        }

        state.tasks.forEach((is_checked, index) => {
            const checkbox = document.getElementById(`task${index}`);
            const itemDiv = checkbox.closest('.task-item');
            checkbox.checked = is_checked;
            if (is_checked) {
                itemDiv.classList.add('checked');
            } else {
                itemDiv.classList.remove('checked');
            }
        });

        state.weekHistory.forEach((isDayDone, index) => {
            const dayBox = document.getElementById(`day-${index}`);
            if (isDayDone) {
                dayBox.classList.add('completed');
            } else {
                dayBox.classList.remove('completed');
            }
        });
    }

    setRandomBackground();
    loadState();
    render();
</script>

</body>
</html>
