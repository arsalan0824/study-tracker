<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Daily Study Tracker</title>
    <style>
        :root {
            --sky-blue: #87CEEB;
            --gray-undone: #e0e0e0;
            --dark-text: #333;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: transparent;
            color: var(--dark-text);
            margin: 0;
            padding: 8px;
            box-sizing: border-box;
            overflow: hidden; /* Stops any vertical scrolling */
        }

        .container {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        /* Merges Date, Streak, and Week Bar into a tight single layout row */
        .top-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 4px;
            border-bottom: 1px solid #f0f0f0;
            padding-bottom: 4px;
        }

        .meta-info {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        h1 {
            margin: 0;
            font-size: 0.9rem;
            font-weight: 700;
            white-space: nowrap;
        }

        .streak-display {
            font-size: 0.9rem;
            font-weight: bold;
            white-space: nowrap;
        }

        /* Ultra-compact horizontal grid layout for the week tracking days */
        .week-bar {
            display: flex;
            gap: 2px;
        }

        .day-box {
            background-color: var(--gray-undone);
            color: #666;
            padding: 2px 4px;
            border-radius: 3px;
            font-size: 0.65rem;
            font-weight: 600;
            text-align: center;
            min-width: 24px;
        }

        .day-box.completed {
            background-color: var(--sky-blue);
            color: white;
        }

        /* Compact interactive list block */
        .checklist {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .task-item {
            display: flex;
            align-items: center;
            padding: 6px 8px;
            background-color: #f7f7f7;
            border-radius: 5px;
            border-left: 3px solid var(--gray-undone);
        }

        .task-item.checked {
            border-left-color: var(--sky-blue);
            background-color: #f0f8ff;
        }

        .task-item input {
            margin: 0 8px 0 0;
            transform: scale(1.05);
            cursor: pointer;
        }

        .task-item a {
            font-size: 0.8rem;
            color: var(--dark-text);
            text-decoration: none;
            width: 100%;
            display: block;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="top-row">
        <div class="meta-info">
            <h1 id="current-date">Loading...</h1>
            <div class="streak-display" id="streak-container">
                Str: <span id="streak-count">0</span>
            </div>
        </div>
        
        <div class="week-bar" id="week-bar">
            <div class="day-box" id="day-0">Su</div>
            <div class="day-box" id="day-1">Mo</div>
            <div class="day-box" id="day-2">Tu</div>
            <div class="day-box" id="day-3">We</div>
            <div class="day-box" id="day-4">Th</div>
            <div class="day-box" id="day-5">Fr</div>
            <div class="day-box" id="day-6">Sa</div>
        </div>
    </div>

    <div class="checklist">
        <div class="task-item">
            <input type="checkbox" id="task0" onclick="toggleTask(0)">
            <a href="https://qotd.collegeboard.org/" target="_blank">SAT Question of the Day</a>
        </div>
        <div class="task-item">
            <input type="checkbox" id="task1" onclick="toggleTask(1)">
            <a href="https://dl.bookfunnel.com/dr23s99lv4" target="_blank">Read News & answer questions</a>
        </div>
        <div class="task-item">
            <input type="checkbox" id="task2" onclick="toggleTask(2)">
            <a href="https://docs.google.com/spreadsheets/d/1IwmM6uSK15S0HBSmyIMgL8GT3XeUnkH1Aay9CYelRps/edit?usp=sharing" target="_blank">Memorize 10 vocab words</a>
        </div>
    </div>
</div>

<script>
    let state = {
        lastActiveDate: "", 
        streak: 0,
        tasks: [false, false, false],
        weekHistory: [false, false, false, false, false, false, false]
    };

    function loadState() {
        const saved = localStorage.getItem('dailyTrackerState');
        if (saved) {
            state = JSON.parse(saved);
        }
        checkDateTransition();
    }

    function saveState() {
        localStorage.setItem('dailyTrackerState', JSON.stringify(state));
    }

    function getTodayString() {
        const d = new Date();
        return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
    }

    function checkDateTransition() {
        const todayStr = getTodayString();
        const today = new Date();
        const currentDayOfWeek = today.getDay();

        if (state.lastActiveDate !== todayStr) {
            if (currentDayOfWeek === 0 && state.lastActiveDate !== "") {
                state.weekHistory = [false, false, false, false, false, false, false];
            }

            if (state.lastActiveDate !== "") {
                const lastDate = new Date(state.lastActiveDate + "T00:00:00");
                const lastDayOfWeek = lastDate.getDay();
                
                if (!state.weekHistory[lastDayOfWeek]) {
                    state.streak = 0;
                }
            }

            state.tasks = [false, false, false];
            state.lastActiveDate = todayStr;
            saveState();
        }
    }

    function toggleTask(index) {
        state.tasks[index] = !state.tasks[index];
        
        const allDone = state.tasks.every(t => t === true);
        const todayIndex = new Date().getDay();

        if (allDone && !state.weekHistory[todayIndex]) {
            state.weekHistory[todayIndex] = true;
            state.streak += 1;
        } 
        else if (!allDone && state.weekHistory[todayIndex]) {
            state.weekHistory[todayIndex] = false;
            state.streak = Math.max(0, state.streak - 1);
        }

        saveState();
        render();
    }

    function render() {
        const targetDate = new Date();
        const options = { month: 'short', day: 'numeric' };
        document.getElementById('current-date').innerText = targetDate.toLocaleDateString('en-US', options);

        const streakCountEl = document.getElementById('streak-count');
        if (state.streak >= 1) {
            streakCountEl.innerHTML = `${state.streak}<span style="color: #ff4500; font-size:0.85rem;">🔥</span>`;
        } else {
            streakCountEl.innerText = state.streak;
        }

        state.tasks.forEach((is_checked, index) => {
            const checkbox = document.getElementById(`task${index}`);
            const itemDiv = checkbox.closest('.task-item');
            checkbox.checked = is_checked;
            if (is_checked) {
                itemDiv.classList.add('checked');
            } else {
                itemDiv.classList.remove('checked');
            }
        });

        state.weekHistory.forEach((isDayDone, index) => {
            const dayBox = document.getElementById(`day-${index}`);
            if (isDayDone) {
                dayBox.classList.add('completed');
            } else {
                dayBox.classList.remove('completed');
            }
        });
    }

    loadState();
    render();
</script>

</body>
</html>
